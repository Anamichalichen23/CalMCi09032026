<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Cabeçalho-->
    <header class="header">
        <div class="logo-area">
             <img src="imc.png" alt="Logo da Pagina de de calculo de IMC" class="logo">
        </div>
    </header>

    <!--Conteudo Principal-->
    <main>
     <div class="container">

          <h2>Calcule o seu peso em (KG)</h2>

          <label for="peso">Informe seu peso em (KG)</label>
          <input type="number" id="peso" placeholder="Ex: 80" step="0.01">
     </div>
    </main>

</body>
<script src="script.js"></script>
</html>
